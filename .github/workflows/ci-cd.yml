name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 检查数据是否变动
      - name: Check for changes in training_data.csv
        id: check_changes
        run: |
          # 检查本次提交中是否包含 training_data.csv
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep 'training_data.csv'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 只有数据变动时才运行训练
      - name: Train Linear Model
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          python train_model.py

      # 将生成的模型推送到 release 分支（保持你的原始逻辑）
      - name: Commit and Push Linear Model to Branch
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 临时保存模型文件
          cp linear_model.txt ../linear_model_backup.txt
          
          # 切换到孤立的 release 分支
          git checkout --orphan temp_release
          git rm -rf .
          
          # 恢复模型文件并提交
          cp ../linear_model_backup.txt ./linear_model.txt
          git add linear_model.txt
          git commit -m "Update linear model v${{ github.run_number }}"
          git push -f origin temp_release:release

      # 使用最新插件：一步完成 Release 创建和文件上传
      - name: Create GitHub Release and Upload Asset
        if: steps.check_changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: "Automated release generated by CI/CD pipeline."
          files: linear_model.txt  # 核心改动：直接指定要上传的文件名